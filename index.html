	<script type="text/javascript">
		var forgetPop = true;
		function onPopState(event) {
			if(forgetPop){
				forgetPop = false;
			} else {
				parent.postMessage(event.target.location.href, "app://obsidian.md");
			}
        }
		window.onpopstate = onPopState;
		window.onmessage = event => {
			if(event.data == "reload"){
				window.document.location.reload();
			}
			forgetPop = true;
		}

		function fitElements(){
			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {
			fitElements();
			if (document.readyState === 'complete') {
				if (window.location.href.indexOf("?export") != -1){
					parent.postMessage(event.target.location.href, "app://obsidian.md");
				}
				if (window.location.href.indexOf("print-pdf") != -1){
					let stateCheck = setInterval(() => {
						clearInterval(stateCheck);
						window.print();
					}, 250);
				}
			}
	};

<div class="has-light-background" style="background-color: white; padding: 0px 20px; box-sizing: border-box; position: absolute; left: 0%; top: 0%; height: 15%; width: 100%; display: flex; flex-direction: column; align-items: flex-start; justify-content: space-evenly" align="left">

 <div class="block">

### Fundamentals of reduced order modelling
</div>


</div>

<div class="has-light-background" style="background-color: white; padding: 0 20px; box-sizing: border-box; position: absolute; left: 0%; top: 20%; height: 80%; width: 100%; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start" align="left">



- Some desired behaviour / question to answer.
	- *'How is stress distributed when the system is forced around the first natural frequency?'*

<div class="block">

- The dynamic behaviours that help us answer this question are made up of configurations that exist in a 200,000 dimensional state space.
</div>

 <!-- .element: class="fragment appear" data-fragment-index="1" -->
<div class="block">

- A reduced-order model aims to capture the same behaviours by parametrising the required configurations over a (much) smaller subspace. 
</div>

 <!-- .element: class="fragment appear" data-fragment-index="2" -->

 
</div>
</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 1200px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<div class="has-light-background" style="background-color: white; padding: 0px 20px; box-sizing: border-box; position: absolute; left: 0%; top: 0%; height: 15%; width: 100%; display: flex; flex-direction: column; align-items: flex-start; justify-content: space-evenly" align="left">

 <div class="block">

### Selecting the subspace
</div>


</div>

<div class="has-light-background" style="background-color: white; padding: 0 20px; box-sizing: border-box; position: absolute; left: 0%; top: 20%; height: 80%; width: 100%; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start" align="left">



- How do we select the subspace without prior knowledge of the dynamic behaviours that it has to capture?

<div class="block">

- Guesswork!
</div>

<!-- .element: class="fragment appear" data-fragment-index="1" -->
<div class="block">

- A good reduced-order method should:
	- Minimise the number of guesses.
	- Minimise the size of the subspace.
	- Demonstrate that the guessed subspace is sufficient.
</div>

<!-- .element: class="fragment appear" data-fragment-index="2" -->
<div class="block">

- Assume we start with zero knowledge about the dynamics of the system and that the equations of motion are inaccessible.
</div>

<!-- .element: class="fragment appear" data-fragment-index="3" -->

 
</div>
</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 1200px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<div class="has-light-background" style="background-color: white; padding: 0px 20px; box-sizing: border-box; position: absolute; left: 0%; top: 0%; height: 15%; width: 100%; display: flex; flex-direction: column; align-items: flex-start; justify-content: space-evenly" align="left">

 <div class="block">

### Geometric nonlinearity
</div>


</div>

<div class="has-light-background" style="background-color: white; padding: 0 20px; box-sizing: border-box; position: absolute; left: 0%; top: 20%; height: 80%; width: 100%; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start" align="left">




- Interested in systems of the form

<div class="block">

`$\mathbf M \ddot{\mathbf x} + \mathbf C \dot{\mathbf x} + \mathbf f_{x}(\mathbf x) = \mathbf F(t).$`
</div>

<!-- .element: class="equation" -->

<div class="block">

- `$\mathbf f_x$` describes a smooth, continuous, nonlinear restoring force.
- `$\mathbf f_{x}(\mathbf x)$` can be many-to-one (not necessarily injective)
- Provided these conditions, the exact form of `$\mathbf f_{x}$` does not need to be known.
</div>

<!-- .element: class="fragment appear" data-fragment-index="1" -->
<div class="block">

- Reduction is achieved by removing unnecessary configurations from the domain of `$\mathbf f_x$` and then re-parametrising.
</div>

<!-- .element: class="fragment appear" data-fragment-index="2" -->
 
</div>
</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 1200px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<div class="has-light-background" style="background-color: white; padding: 0px 20px; box-sizing: border-box; position: absolute; left: 0%; top: 0%; height: 15%; width: 100%; display: flex; flex-direction: column; align-items: flex-start; justify-content: space-evenly" align="left">

 <div class="block">

### The Applied Force Reduction (AFR) method
</div>


</div>

<div class="has-light-background" style="background-color: white; padding: 0 20px; box-sizing: border-box; position: absolute; left: 0%; top: 20%; height: 80%; width: 100%; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start" align="left">



- Assume that the restoring force at the desired configurations are linear combinations of a subset of 'modal forces'.

<div class="block">

- Apply forces in combinations of these shapes to the FE model to build up the reduced subspace. For a loadcase, `$\boldsymbol \lambda^{(i)}$`:

<div class="block">

1. Apply `$\mathbf f_{x}^{(i)} = \mathbf M \boldsymbol\Phi_{r}\boldsymbol\lambda^{(i)}$`
2. Extract `$\mathbf x^{(i)}$` from FE model
3. Calculate `$\mathbf r^{(i)} = \boldsymbol \Phi_r^{\text{T}}\mathbf M \mathbf x^{(i)}$`
</div>

<!-- .element: class="equation" -->
</div>

<!-- .element: class="fragment appear" data-fragment-index="1" -->

<div class="block">

- Over a sufficient range of loadcases we can fit polynomial models for `$\mathbf f_{x}(\mathbf r)$` and `$\mathbf x(\mathbf r)$`.
<div class="block">

<!-- .element: class="fragment appear" data-fragment-index="2" --> 
</div>
</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 1200px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<div class="has-light-background" style="background-color: white; padding: 0px 20px; box-sizing: border-box; position: absolute; left: 0%; top: 0%; height: 15%; width: 100%; display: flex; flex-direction: column; align-items: flex-start; justify-content: space-evenly" align="left">

 <div class="block">

### The Applied Force Reduction (AFR) method
</div>


</div>

<div class="has-light-background" style="background-color: white; padding: 0 20px; box-sizing: border-box; position: absolute; left: 0%; top: 20%; height: 80%; width: 100%; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start" align="left">



- Project equations of motion onto `$\mathbf x(\mathbf r)$`:

<div class="block">

`$\left(\mathbf x'\right)^{\text{T}}\left(\mathbf M \left(\mathbf x'\ddot{\mathbf r} + \mathbf x''\dot{\mathbf r} \dot{\mathbf r}\right) + \mathbf C \mathbf x'\dot{\mathbf r} + \mathbf f_{x}(\mathbf r) \right) = \left(\mathbf x'\right)^{\text{T}}\mathbf F_x(t).$`
</div>

<!-- .element: class="equation" -->

<div class="block">

- In order for the final results to be accurate this equation must be evaluated correctly and `$\mathbf x(\mathbf r)$` must be 'relevant'.
</div>

<!-- .element: class="fragment appear" data-fragment-index="1" -->
<div class="block">

- Verification vs validation:
	- Verification: Has the method been correctly implemented?
	- Validation: Are the underlying assumptions valid?
</div>

<!-- .element: class="fragment appear" data-fragment-index="2" -->
<div class="block">

- We'll assume that all subsequent models have been verified.
</div>

<!-- .element: class="fragment appear" data-fragment-index="3" -->

 
</div>
</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 1200px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

 <div class="block">

### Modal restoring force assumption
</div>


</div>

<div class="has-light-background" style="background-color: white; padding: 0 20px; box-sizing: border-box; position: absolute; left: 0%; top: 20%; height: 80%; width: 100%; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start" align="left">



<div class="block">

- Is this a good guess?
	- It can be!<!-- .element: class="fragment appear" data-fragment-index="1" -->
</div>



<div class="block">

- Generally the more sophisticated the guess the more complex the process for creating the reduced-order model.

- The more robust the validation method the less we require a high degree of confidence in the initial guess.

	  function isLight(color) {
		let hex = color.replace('#', '');

		// convert #fff => #ffffff
		if(hex.length == 3){
			hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
		}

		const c_r = parseInt(hex.substr(0, 2), 16);
		const c_g = parseInt(hex.substr(2, 2), 16);
		const c_b = parseInt(hex.substr(4, 2), 16);
		const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
		return brightness > 155;
	}
